env: "development"

http:
  port: ":8080"
  read_timeout: "10s"
  write_timeout: "10s"
  idle_timeout: "60s"
  shutdown_timeout: "8s"

rate_limit:
  enabled: true
  cleanup_interval: "3m"
  global:
    limit: 10.0
    burst: 20
  auth:
    limit: 1.0
    burst: 3

auth:
  access_token_ttl: "30m"
  refresh_token_ttl: "168h"         # 7 days
  email_verification_ttl: "24h"     # 1 day
  password_reset_ttl: "1h"          # 1 hour

oauth:
  yandex:
    client_id: ""                   # Set via ENV
    client_secret: ""               # Set via ENV

smtp:
  host: "smtp.example.com"
  port: 587
  username: ""                      # Set via ENV
  password: ""                      # Set via ENV
  from_address: "noreply@backforge.tech"

postgres:
  connection_url: ""
  host: "localhost"
  port: 5432
  ssl_mode: "disable"
  pool:
    max_conns: 15
    min_conns: 2
    max_conn_lifetime: "30m"

client:
  url: "http://localhost:5173"   # vite dev server

api:
  url: "http://localhost:8080"

logging:
  level: "info"                 # debug / info / warn / error