definitions:
  analytics.overallProgressResponse:
    properties:
      known:
        type: integer
      learned:
        type: integer
      new:
        type: integer
      skipped:
        type: integer
      total:
        type: integer
    type: object
  analytics.topicProgressPercentResponse:
    properties:
      completed:
        type: integer
      percent:
        type: number
      topic_id:
        type: string
      total:
        type: integer
    type: object
  auth.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.registerRequest:
    properties:
      email:
        type: string
      first_name:
        maxLength: 64
        minLength: 2
        type: string
      last_name:
        maxLength: 64
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - email
    - first_name
    - password
    type: object
  auth.requestResetRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  auth.resendVerificationRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  auth.resetPasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  auth.tokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  auth.verifyEmailRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  auth.yandexCallbackRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  domain.ProgressStatus:
    enum:
    - new
    - skipped
    - known
    - learned
    type: string
    x-enum-comments:
      ProgressStatusKnown: User marked the question as known
      ProgressStatusLearned: User marked the question as learned
      ProgressStatusNew: User has not seen the question
      ProgressStatusSkipped: User skipped the question
    x-enum-descriptions:
    - User has not seen the question
    - User skipped the question
    - User marked the question as known
    - User marked the question as learned
    x-enum-varnames:
    - ProgressStatusNew
    - ProgressStatusSkipped
    - ProgressStatusKnown
    - ProgressStatusLearned
  domain.UserQuestionProgress:
    properties:
      id:
        type: string
      questionID:
        type: string
      status:
        $ref: '#/definitions/domain.ProgressStatus'
      updatedAt:
        type: string
      userID:
        type: string
    type: object
  progress.aggregateResponse:
    properties:
      current_position:
        type: integer
      known:
        type: integer
      learned:
        type: integer
      new:
        type: integer
      skipped:
        type: integer
    type: object
  progress.markRequest:
    properties:
      question_id:
        type: string
      topic_id:
        type: string
    required:
    - question_id
    - topic_id
    type: object
  question.createRequest:
    properties:
      content:
        additionalProperties: true
        description: Question content (structured)
        type: object
      created_by:
        description: Creator user ID
        type: string
      is_free:
        description: Access flag
        type: boolean
      level:
        description: Difficulty level
        type: string
      slug:
        description: Unique slug
        type: string
      tag_ids:
        description: Tags
        items:
          type: string
        type: array
      title:
        description: Question title
        type: string
      topic_id:
        description: Optional topic
        type: string
    required:
    - content
    - level
    - slug
    - title
    type: object
  question.createResponse:
    properties:
      id:
        description: New question ID
        type: string
    type: object
  question.listCardResponse:
    properties:
      id:
        type: string
      is_free:
        type: boolean
      is_new:
        type: boolean
      level:
        type: string
      slug:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  question.questionResponse:
    properties:
      content:
        additionalProperties: true
        type: object
      created_by:
        type: string
      id:
        type: string
      is_free:
        type: boolean
      level:
        type: string
      slug:
        type: string
      tag_ids:
        items:
          type: string
        type: array
      title:
        type: string
      topic_id:
        type: string
      updated_by:
        type: string
    type: object
  question.updateRequest:
    properties:
      content:
        additionalProperties: true
        description: Optional new content
        type: object
      is_free:
        description: Optional access flag
        type: boolean
      level:
        description: Optional new level
        type: string
      slug:
        description: Optional new slug
        type: string
      tag_ids:
        description: Optional new tags
        items:
          type: string
        type: array
      title:
        description: Optional new title
        type: string
      topic_id:
        description: Optional topic
        type: string
      updated_by:
        description: Updater user ID
        type: string
    type: object
  render.Error:
    properties:
      details: {}
      error:
        type: string
    type: object
  render.Message:
    properties:
      message:
        type: string
    type: object
  tag.createRequest:
    properties:
      created_by:
        description: Creator user ID
        type: string
      name:
        description: Tag name
        type: string
    required:
    - name
    type: object
  tag.createResponse:
    properties:
      id:
        description: New tag ID
        type: string
    type: object
  tag.tagResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  topic.createRequest:
    properties:
      created_by:
        description: Creator user ID
        type: string
      description:
        description: Optional description
        type: string
      slug:
        description: Unique slug for the topic
        type: string
      title:
        description: Topic title
        type: string
    required:
    - slug
    - title
    type: object
  topic.createResponse:
    properties:
      id:
        description: New topic ID
        type: string
    type: object
  topic.topicResponse:
    properties:
      created_by:
        type: string
      description:
        type: string
      id:
        type: string
      slug:
        type: string
      title:
        type: string
      updated_by:
        type: string
    type: object
  topic.topicRowResponse:
    properties:
      id:
        type: string
      question_count:
        type: integer
      slug:
        type: string
      title:
        type: string
    type: object
  topic.updateRequest:
    properties:
      description:
        description: Optional new description
        type: string
      slug:
        description: Optional new slug
        type: string
      title:
        description: Optional new title
        type: string
      updated_by:
        description: Updater user ID
        type: string
    type: object
  user.updateProfileRequest:
    properties:
      first_name:
        maxLength: 64
        minLength: 2
        type: string
      last_name:
        maxLength: 64
        minLength: 2
        type: string
      photo_url:
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    type: object
  user.userResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      has_password:
        type: boolean
      id:
        type: string
      is_email_verified:
        type: boolean
      last_name:
        type: string
      photo_url:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
info:
  contact: {}
paths:
  /admin/questions:
    post:
      consumes:
      - application/json
      description: Create a new question
      parameters:
      - description: Question payload
        in: body
        name: question
        required: true
        schema:
          $ref: '#/definitions/question.createRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/question.createResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/render.Error'
        "409":
          description: Question already exists
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      summary: Create question
      tags:
      - Questions
  /admin/questions/{id}:
    get:
      description: Returns full question including content (admin endpoint)
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/question.questionResponse'
        "400":
          description: Invalid question ID
          schema:
            $ref: '#/definitions/render.Error'
        "404":
          description: Question not found
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      summary: Get question by ID
      tags:
      - Questions
    put:
      consumes:
      - application/json
      description: Update an existing question
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: string
      - description: Question update payload
        in: body
        name: question
        required: true
        schema:
          $ref: '#/definitions/question.updateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/render.Error'
        "404":
          description: Question not found
          schema:
            $ref: '#/definitions/render.Error'
        "409":
          description: Question already exists
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      summary: Update question
      tags:
      - Questions
  /admin/tags:
    post:
      consumes:
      - application/json
      description: Create a new tag
      parameters:
      - description: Tag payload
        in: body
        name: tag
        required: true
        schema:
          $ref: '#/definitions/tag.createRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/tag.createResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/render.Error'
        "409":
          description: Tag already exists
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      summary: Create tag
      tags:
      - Tags
  /admin/tags/{id}:
    delete:
      description: Delete a tag by ID
      parameters:
      - description: Tag ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Invalid tag ID
          schema:
            $ref: '#/definitions/render.Error'
        "404":
          description: Tag not found
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      summary: Delete tag
      tags:
      - Tags
  /admin/topics:
    post:
      consumes:
      - application/json
      description: Create a new topic
      parameters:
      - description: Topic payload
        in: body
        name: topic
        required: true
        schema:
          $ref: '#/definitions/topic.createRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/topic.createResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/render.Error'
        "409":
          description: Topic already exists
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      summary: Create topic
      tags:
      - Topics
  /admin/topics/{id}:
    put:
      consumes:
      - application/json
      description: Update an existing topic
      parameters:
      - description: Topic ID
        in: path
        name: id
        required: true
        type: string
      - description: Topic update payload
        in: body
        name: topic
        required: true
        schema:
          $ref: '#/definitions/topic.updateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/render.Error'
        "404":
          description: Topic not found
          schema:
            $ref: '#/definitions/render.Error'
        "409":
          description: Topic already exists
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      summary: Update topic
      tags:
      - Topics
  /analytics/overall:
    get:
      description: Returns aggregated statistics for the authenticated user's dashboard
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/analytics.overallProgressResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      security:
      - BearerAuth: []
      summary: Get overall progress
      tags:
      - Analytics
  /analytics/reset:
    delete:
      description: Reset all question and topic progress for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      security:
      - BearerAuth: []
      summary: Reset all progress
      tags:
      - Analytics
  /analytics/topics:
    get:
      description: Returns completion percentages for each topic for the authenticated
        user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/analytics.topicProgressPercentResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      security:
      - BearerAuth: []
      summary: Get topic progress percentages
      tags:
      - Analytics
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset link to the provided email if it exists
      parameters:
      - description: Email payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.requestResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: If the email is registered, a reset link has been sent
          schema:
            $ref: '#/definitions/render.Message'
      summary: Request password reset email
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access and refresh tokens
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.tokenResponse'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/render.Error'
        "401":
          description: Invalid credentials or unverified email
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.Error'
      summary: Login using email and password
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a valid refresh token for a new pair of access and refresh
        tokens
      parameters:
      - description: Refresh token payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.tokenResponse'
        "401":
          description: Invalid or revoked token
          schema:
            $ref: '#/definitions/render.Error'
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Registers a new user and sends an email verification link
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Registration successful. Please check your email.
          schema:
            $ref: '#/definitions/render.Message'
        "400":
          description: Validation failed
          schema:
            $ref: '#/definitions/render.Error'
        "409":
          description: Email or Username already taken
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.Error'
      summary: Register a new user
      tags:
      - Auth
  /auth/resend-verification:
    post:
      consumes:
      - application/json
      description: Sends a new email verification link if the account exists and is
        not yet verified
      parameters:
      - description: Email payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.resendVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: If the account exists and needs verification, an email has
            been sent
          schema:
            $ref: '#/definitions/render.Message'
        "400":
          description: Email is already verified
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.Error'
      summary: Resend verification email
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Sets a new password using a valid reset token
      parameters:
      - description: Token and new password payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.resetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset successfully
          schema:
            $ref: '#/definitions/render.Message'
        "400":
          description: Invalid or expired token
          schema:
            $ref: '#/definitions/render.Error'
      summary: Set a new password
      tags:
      - Auth
  /auth/verify-email:
    post:
      consumes:
      - application/json
      description: Verifies a user's email using the token sent to their inbox
      parameters:
      - description: Verification token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.verifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Email verified successfully
          schema:
            $ref: '#/definitions/render.Message'
        "400":
          description: Invalid or expired token
          schema:
            $ref: '#/definitions/render.Error'
      summary: Verify user email
      tags:
      - Auth
  /auth/yandex/callback:
    post:
      consumes:
      - application/json
      description: Exchanges Yandex authorization code for JWT tokens
      parameters:
      - description: Yandex code payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.yandexCallbackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.tokenResponse'
        "400":
          description: Invalid code or OAuth failure
          schema:
            $ref: '#/definitions/render.Error'
      summary: Yandex OAuth Callback
      tags:
      - Auth
  /progress/known:
    post:
      consumes:
      - application/json
      description: Mark a question as known for the authenticated user
      parameters:
      - description: Progress payload
        in: body
        name: progress
        required: true
        schema:
          $ref: '#/definitions/progress.markRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/render.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/render.Error'
        "404":
          description: Progress not found
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      security:
      - BearerAuth: []
      summary: Mark question as known
      tags:
      - Progress
  /progress/learned:
    post:
      consumes:
      - application/json
      description: Mark a question as learned for the authenticated user
      parameters:
      - description: Progress payload
        in: body
        name: progress
        required: true
        schema:
          $ref: '#/definitions/progress.markRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/render.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/render.Error'
        "404":
          description: Progress not found
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      security:
      - BearerAuth: []
      summary: Mark question as learned
      tags:
      - Progress
  /progress/questions/{id}:
    get:
      description: Get progress of a specific question for the authenticated user
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.UserQuestionProgress'
        "400":
          description: Invalid question ID
          schema:
            $ref: '#/definitions/render.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/render.Error'
        "404":
          description: Progress not found
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      security:
      - BearerAuth: []
      summary: Get question progress
      tags:
      - Progress
  /progress/skipped:
    post:
      consumes:
      - application/json
      description: Mark a question as skipped for the authenticated user
      parameters:
      - description: Progress payload
        in: body
        name: progress
        required: true
        schema:
          $ref: '#/definitions/progress.markRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/render.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/render.Error'
        "404":
          description: Progress not found
          schema:
            $ref: '#/definitions/render.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/render.Error'
      security:
      - BearerAuth: []
      summary: Mark question as skipped
      tags:
      - Progress
  /progress/topics/{id}:
    delete:
      description: Reset all progress data for a topic for the authenticated user
      parameters:
      - description: Topic ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
